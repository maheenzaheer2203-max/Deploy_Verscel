<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StockFlow — Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ================= GOOGLE FONTS ================= */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap');

/* ================= ULTIMATE DESIGN SYSTEM ================= */
:root {
  /* Premium Colors */
  --primary: #7c3aed;
  --primary-dark: #6d28d9;
  --primary-light: #a78bfa;
  --primary-ultra-light: #ede9fe;
  
  --secondary: #06b6d4;
  --secondary-dark: #0891b2;
  --secondary-light: #22d3ee;
  
  --accent: #4f46e5;
  --accent-warm: #f97316;
  
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  
  /* Backgrounds */
  --bg-primary: #0b1020;
  --bg-secondary: #050816;
  --bg-tertiary: #0f1a33;
  --bg-glass: rgba(11, 18, 32, 0.75);
  
  /* Text Colors */
  --text-primary: #f1f5f9;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  
  /* Borders */
  --border-primary: rgba(255, 255, 255, 0.1);
  --border-light: rgba(255, 255, 255, 0.05);
  --border-glow: rgba(124, 58, 237, 0.3);
  
  /* Shadows */
  --shadow-soft: 0 5px 20px rgba(0, 0, 0, 0.15);
  --shadow-medium: 0 10px 40px rgba(0, 0, 0, 0.25);
  --shadow-hard: 0 20px 60px rgba(0, 0, 0, 0.4);
  --shadow-ultra: 0 40px 120px rgba(0, 0, 0, 0.6);
  
  /* Glows - Stunning Effects */
  --glow-purple: 0 0 30px rgba(124, 58, 237, 0.4), 0 0 60px rgba(124, 58, 237, 0.2);
  --glow-cyan: 0 0 30px rgba(6, 182, 212, 0.4), 0 0 60px rgba(6, 182, 212, 0.2);
  --glow-combo: 0 0 40px rgba(124, 58, 237, 0.3), 0 0 40px rgba(6, 182, 212, 0.2);
  --glow-intense: 0 0 50px rgba(124, 58, 237, 0.5), 0 0 100px rgba(124, 58, 237, 0.25);
  
  /* Radius */
  --radius-small: 12px;
  --radius-medium: 16px;
  --radius-large: 24px;
  --radius-xlarge: 32px;
  
  /* Transitions - Smooth & Beautiful */
  --transition-quick: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-flow: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-bounce: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --transition-elastic: 0.7s cubic-bezier(0.6, 0.2, 0.1, 1);
}

/* ================= UNIVERSAL RESET ================= */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

html {
  scroll-behavior: smooth;
}

/* ================= BODY - STUNNING BACKGROUND ================= */
body {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  
  /* Multiple radial gradients for depth */
  background-image:
    radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.25) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.2) 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.1) 0%, transparent 50%),
    linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
  position: relative;
  font-size: 16px;
  color: var(--text-primary);
}

/* Animated Grid Background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
  animation: gridMove 30s linear infinite;
  opacity: 0.5;
}

/* Floating Animated Orb */
body::after {
  content: '';
  position: fixed;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
  top: -300px;
  right: -300px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: orbDance 20s ease-in-out infinite;
  filter: blur(80px);
}

/* ================= ANIMATIONS ================= */
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 80px 80px; }
}

@keyframes orbDance {
  0%, 100% { 
    transform: translate(0, 0) scale(1); 
    opacity: 0.8;
  }
  25% { 
    transform: translate(-50px, -50px) scale(1.1); 
    opacity: 0.6;
  }
  50% { 
    transform: translate(50px, 50px) scale(0.9); 
    opacity: 1;
  }
  75% { 
    transform: translate(-30px, 50px) scale(1.05); 
    opacity: 0.7;
  }
}

@keyframes containerFloat {
  0%, 100% { 
    transform: translateY(0px) rotateX(0deg); 
  }
  50% { 
    transform: translateY(-15px) rotateX(2deg); 
  }
}

@keyframes containerGlow {
  0%, 100% { 
    box-shadow: 
      var(--shadow-ultra),
      0 0 0 1px rgba(124, 58, 237, 0.1),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }
  50% { 
    box-shadow: 
      var(--shadow-ultra),
      0 0 60px rgba(124, 58, 237, 0.2),
      var(--glow-purple),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-60px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(60px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

@keyframes textGlow {
  0%, 100% { 
    text-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
  }
  50% { 
    text-shadow: 0 0 40px rgba(124, 58, 237, 0.6), 0 0 80px rgba(6, 182, 212, 0.3);
  }
}

@keyframes buttonPulse {
  0%, 100% { 
    box-shadow: 
      0 10px 40px rgba(124, 58, 237, 0.4),
      0 0 20px rgba(124, 58, 237, 0.2);
  }
  50% { 
    box-shadow: 
      0 15px 60px rgba(124, 58, 237, 0.6),
      0 0 40px rgba(6, 182, 212, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
}

@keyframes shimmerFlow {
  0% { 
    left: -100%; 
  }
  100% { 
    left: 100%; 
  }
}

@keyframes inputFocusGlow {
  0%, 100% {
    box-shadow: 
      0 0 0 0 rgba(124, 58, 237, 0.4),
      inset 0 0 20px rgba(124, 58, 237, 0.1);
  }
  50% {
    box-shadow: 
      0 0 0 15px rgba(124, 58, 237, 0),
      inset 0 0 40px rgba(124, 58, 237, 0.2);
  }
}

@keyframes borderGlow {
  0%, 100% { 
    border-color: rgba(124, 58, 237, 0.3); 
    box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
  }
  50% { 
    border-color: rgba(124, 58, 237, 0.6); 
    box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
  }
}

@keyframes iconFloat {
  0%, 100% { 
    transform: translateY(0) scale(1); 
  }
  50% { 
    transform: translateY(-6px) scale(1.1); 
  }
}

@keyframes tabSlide {
  0% { 
    transform: translateY(-5px); 
    opacity: 0;
  }
  100% { 
    transform: translateY(0); 
    opacity: 1;
  }
}

/* ================= MAIN CONTAINER - STUNNING ================= */
.container {
  width: 100%;
  max-width: 1120px;
  min-height: 620px;
  display: flex;
  border-radius: var(--radius-xlarge);
  overflow: hidden;
  background: var(--bg-glass);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--border-primary);
  box-shadow: 
    var(--shadow-ultra),
    0 0 0 1px rgba(124, 58, 237, 0.1),
    0 0 80px rgba(124, 58, 237, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  animation: containerFloat 6s ease-in-out infinite, containerGlow 4s ease-in-out infinite;
  position: relative;
  z-index: 10;
  transition: all var(--transition-smooth);
}

.container:hover {
  transform: translateY(-5px);
  border-color: rgba(124, 58, 237, 0.25);
  box-shadow: 
    var(--shadow-ultra),
    0 0 0 1px rgba(124, 58, 237, 0.2),
    0 0 120px rgba(124, 58, 237, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

/* ================= LEFT PANEL - BEAUTIFUL HERO ================= */
.left {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.85) 100%),
              url('https://images.unsplash.com/photo-1556740749-887f6717d7e4?q=80&w=1600');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  text-align: center;
  padding: 50px;
  animation: slideInLeft 0.9s var(--transition-bounce);
}

/* Layered Glow Effects */
.left::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 30% 40%, rgba(124, 58, 237, 0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 70%, rgba(6, 182, 212, 0.25) 0%, transparent 55%);
  animation: glowPulse 8s ease-in-out infinite alternate;
}

@keyframes glowPulse {
  from { opacity: 0.6; }
  to { opacity: 1; }
}

/* Animated Light Sweep */
.left::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    45deg,
    transparent 30%,
    rgba(255, 255, 255, 0.08) 50%,
    transparent 70%
  );
  animation: lightWave 8s linear infinite;
  pointer-events: none;
}

@keyframes lightWave {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}

/* ================= LEFT CONTENT ================= */
.left h1 {
  font-size: clamp(36px, 6vw, 68px);
  font-weight: 900;
  z-index: 2;
  position: relative;
  letter-spacing: -2px;
  line-height: 1.05;
  font-family: 'Space Grotesk', sans-serif;
  
  background: linear-gradient(135deg, 
    #ffffff 0%, 
    #e0e7ff 40%, 
    #c7d2fe 60%, 
    #a5f3fc 100%);
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  
  animation: textGlow 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(124, 58, 237, 0.3));
}

.left p {
  margin-top: 20px;
  color: rgba(226, 232, 240, 0.8);
  z-index: 2;
  position: relative;
  font-size: 16px;
  line-height: 1.8;
  max-width: 360px;
  font-weight: 400;
  letter-spacing: 0.5px;
  animation: slideInLeft 1s var(--transition-bounce) 0.2s both;
}

/* ================= RIGHT PANEL - FORM SECTION ================= */
.right {
  width: 450px;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 50px;
  background: rgba(8, 14, 30, 0.98);
  border-left: 1px solid var(--border-primary);
  position: relative;
  animation: slideInRight 0.9s var(--transition-bounce);
}

/* Glowing Top Line */
.right::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent 0%,
    rgba(124, 58, 237, 0.6) 25%,
    rgba(6, 182, 212, 0.6) 75%,
    transparent 100%);
  box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
}

/* Glowing Bottom Accent */
.right::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent 0%,
    rgba(6, 182, 212, 0.5) 50%,
    transparent 100%);
  box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
}

/* ================= CARD - MASTERPIECE ================= */
.card {
  width: 100%;
  max-width: 380px;
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  padding: 45px;
  border-radius: var(--radius-large);
  border: 1.5px solid var(--border-primary);
  box-shadow: 
    0 15px 50px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -1px 0 rgba(0, 0, 0, 0.2);
  animation: slideInRight 0.8s var(--transition-bounce) 0.1s both;
  position: relative;
  overflow: hidden;
  transition: all var(--transition-flow);
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, 
    rgba(124, 58, 237, 0.2) 0%, 
    transparent 60%);
  opacity: 0;
  transition: opacity var(--transition-smooth);
  pointer-events: none;
}

.card:hover {
  transform: translateY(-10px);
  border-color: rgba(124, 58, 237, 0.4);
  box-shadow: 
    0 25px 80px rgba(0, 0, 0, 0.5),
    0 0 60px rgba(124, 58, 237, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

.card:hover::before {
  opacity: 1;
}

/* ================= TABS - PREMIUM ================= */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-medium);
  padding: 6px;
  position: relative;
  overflow: hidden;
}

.tabs::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, 
    rgba(124, 58, 237, 0.1) 0%, 
    transparent 70%);
  pointer-events: none;
}

.tabs button {
  flex: 1;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition-smooth);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

.tabs button::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(124, 58, 237, 0.2), 
    rgba(6, 182, 212, 0.2));
  opacity: 0;
  transition: opacity var(--transition-smooth);
  border-radius: 10px;
}

.tabs button:hover:not(.active) {
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.05);
  transform: translateY(-2px);
}

.tabs button:hover::before {
  opacity: 0.3;
}

.tabs button.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  background-size: 100% 100%;
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 
    0 8px 30px rgba(124, 58, 237, 0.45),
    0 0 0 1px rgba(255, 255, 255, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
  animation: tabPulse 2s ease-in-out infinite;
}

@keyframes tabPulse {
  0%, 100% {
    box-shadow: 
      0 8px 30px rgba(124, 58, 237, 0.45),
      0 0 20px rgba(124, 58, 237, 0.2);
  }
  50% {
    box-shadow: 
      0 12px 40px rgba(124, 58, 237, 0.6),
      0 0 50px rgba(6, 182, 212, 0.3);
  }
}

/* ================= INPUT BOX - GORGEOUS ================= */
.inputBox {
  display: flex;
  align-items: center;
  background: rgba(20, 30, 50, 0.8);
  padding: 16px 18px;
  margin-bottom: 18px;
  border-radius: var(--radius-medium);
  border: 1.5px solid var(--border-primary);
  transition: all var(--transition-smooth);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(15px);
}

.inputBox::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,
    rgba(124, 58, 237, 0.15),
    rgba(6, 182, 212, 0.15));
  opacity: 0;
  transition: opacity var(--transition-smooth);
  pointer-events: none;
  border-radius: var(--radius-medium);
}

.inputBox::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg,
    transparent,
    var(--primary),
    var(--secondary),
    transparent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition-flow);
}

.inputBox:hover {
  border-color: var(--border-glow);
  background: rgba(20, 30, 50, 0.95);
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(124, 58, 237, 0.1);
}

.inputBox:hover::before {
  opacity: 0.3;
}

.inputBox:focus-within {
  border-color: var(--primary);
  background: rgba(20, 30, 50, 1);
  transform: translateY(-4px) scale(1.02);
  box-shadow: 
    0 0 0 3px rgba(124, 58, 237, 0.15),
    0 12px 40px rgba(124, 58, 237, 0.25),
    inset 0 0 30px rgba(124, 58, 237, 0.08);
  animation: inputFocusGlow 1.5s ease-in-out infinite;
}

.inputBox:focus-within::before {
  opacity: 0.6;
}

.inputBox:focus-within::after {
  transform: scaleX(1);
}

.inputBox i {
  color: var(--text-dim);
  margin-right: 14px;
  font-size: 17px;
  transition: all var(--transition-smooth);
  animation: iconFloat 3s ease-in-out infinite;
}

.inputBox:focus-within i {
  color: var(--primary);
  transform: scale(1.25) rotate(12deg);
  animation: none;
}

.inputBox input {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.4px;
}

.inputBox input::placeholder {
  color: var(--text-dim);
}

/* ================= BUTTON - ULTIMATE ================= */
button.mainBtn {
  width: 100%;
  padding: 16px 22px;
  border: none;
  border-radius: var(--radius-medium);
  
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, var(--secondary) 100%);
  background-size: 400% 400%;
  background-position: 0% 0%;
  
  color: #fff;
  font-weight: 900;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  
  cursor: pointer;
  transition: all var(--transition-smooth);
  
  box-shadow: 
    0 12px 40px rgba(124, 58, 237, 0.45),
    0 0 0 1px rgba(255, 255, 255, 0.15) inset;
  
  position: relative;
  overflow: hidden;
  animation: buttonPulse 3s ease-in-out infinite;
}

button.mainBtn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.2),
    transparent
  );
  transition: left 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}

button.mainBtn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, 
    rgba(255, 255, 255, 0.25) 0%, 
    transparent 60%);
  opacity: 0;
  transition: opacity var(--transition-smooth);
  pointer-events: none;
}

button.mainBtn:hover {
  transform: translateY(-4px) scale(1.02);
  background-position: 100% 0%;
  box-shadow: 
    0 20px 70px rgba(124, 58, 237, 0.6),
    0 0 80px rgba(6, 182, 212, 0.3),
    0 0 0 1px rgba(255, 255, 255, 0.2) inset;
  letter-spacing: 1px;
}

button.mainBtn:hover::before {
  left: 100%;
}

button.mainBtn:hover::after {
  opacity: 1;
}

button.mainBtn:active {
  transform: translateY(-2px) scale(0.98);
  box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
}

button.mainBtn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none;
}

/* ================= FORM GROUPS ================= */
.form-group {
  margin-bottom: 16px;
  animation: slideInRight 0.7s var(--transition-bounce) both;
}

.form-group:nth-child(2) { animation-delay: 0.15s; }
.form-group:nth-child(3) { animation-delay: 0.25s; }
.form-group:nth-child(4) { animation-delay: 0.35s; }

.form-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  font-size: 13px;
  gap: 12px;
}

.form-footer a {
  color: var(--primary);
  text-decoration: none;
  transition: all var(--transition-smooth);
  position: relative;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.form-footer a::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  transition: width var(--transition-smooth);
}

.form-footer a:hover {
  color: var(--secondary);
  transform: translateX(3px);
}

.form-footer a:hover::after {
  width: 100%;
}

/* ================= RESPONSIVE DESIGN ================= */

<body>

<div class="container">

<div class="left">
    <div>
        <h1>ERP SaaS</h1>
        <p>Multi Company System</p>
    </div>
</div>

<div class="right">

<div class="card">

<!-- TABS -->
<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="registerTab">Register</button>
</div>

<!-- LOGIN -->
<div id="loginBox">

<div class="inputBox">
<i class="fa fa-building"></i>
<input id="loginCompany" placeholder="Company Code">
</div>

<div class="inputBox">
<i class="fa fa-envelope"></i>
<input id="loginEmail" placeholder="Email">
</div>

<div class="inputBox">
<i class="fa fa-lock"></i>
<input type="password" id="loginPassword" placeholder="Password">
</div>

<button class="mainBtn" onclick="login()">Login</button>

</div>

<!-- REGISTER -->
<div id="registerBox" style="display:none;">

<div class="inputBox">
<i class="fa fa-building"></i>
<input id="companyName" placeholder="Company Name">
</div>

<div class="inputBox">
<i class="fa fa-code"></i>
<input id="companyCode" placeholder="Company Code">
</div>

<div class="inputBox">
<i class="fa fa-envelope"></i>
<input id="registerEmail" placeholder="Email">
</div>

<div class="inputBox">
<i class="fa fa-lock"></i>
<input type="password" id="registerPassword" placeholder="Password">
</div>

<button class="mainBtn" onclick="registerUser()">Register</button>

</div>

</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const loginTab = document.getElementById("loginTab");
const registerTab = document.getElementById("registerTab");
const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");

/* ================= TAB SWITCH ================= */
loginTab.onclick = () => {
    loginTab.classList.add("active");
    registerTab.classList.remove("active");
    loginBox.style.display = "block";
    registerBox.style.display = "none";
};

registerTab.onclick = () => {
    registerTab.classList.add("active");
    loginTab.classList.remove("active");
    loginBox.style.display = "none";
    registerBox.style.display = "block";
};

/* ================= REGISTER ================= */
window.registerUser = async function(){

    let data = {
        company_name: document.getElementById("companyName").value,
        company_code: document.getElementById("companyCode").value,
        email: document.getElementById("registerEmail").value,
        password: document.getElementById("registerPassword").value
    };

    try {
        let res = await fetch("/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        let result = await res.json();
        alert(result.msg);

    } catch (err) {
        alert("Register Error");
        console.log(err);
    }
};

/* ================= LOGIN (FINAL FIXED) ================= */
window.login = async function(){

    let data = {
        company_code: document.getElementById("loginCompany").value,
        email: document.getElementById("loginEmail").value,
        password: document.getElementById("loginPassword").value
    };

    try {

        let res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",   // 🔥 MOST IMPORTANT FIX
            body: JSON.stringify(data)
        });

        let result = await res.json();

        if (res.ok && result.redirect) {
            window.location.href = result.redirect;
        } else {
            alert(result.msg || "Login Failed");
        }

    } catch (err) {
        alert("Login Error");
        console.log(err);
    }
};

});
</script>

</body>
</html>
