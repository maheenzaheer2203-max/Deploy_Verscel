/* ================= RESET ================= */

}

.navbar{
height: 64px;
position:sticky;
top:0;
z-index:999;

justify-content:space-between;
align-items:center;

padding: 0 28px;

background:rgba(12,18,36,0.75);

}

.logo a{

}

transition:.3s;
}

.left button:hover{
transform:translateY(-3px);
}

/* ================= KPI ================= */
.kpi{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;

}

.kpi-card{
background:rgba(15,26,51,0.8);

border-radius:var(--radius);

text-align:center;
transition:.3s;

}

.kpi-card:hover{

}

.kpi-card h3{

}

.kpi-card span{
font-size:26px;

}

.kpi-card:nth-child(1){border-left:4px solid var(--primary);}
.kpi-card:nth-child(2){border-left:4px solid var(--red);}
.kpi-card:nth-child(3){border-left:4px solid var(--green);}

/* ================= SEARCH ================= */

width:100%;
padding:12px;
border-radius:12px;

background:#0b1428;
color:white;

}

.buy{

.del{

<script>

/* OPEN MENU */
function openMenu(){
document.getElementById("navLinks").classList.add("show");
}

/* CLOSE MENU */
function closeMenu(){
document.getElementById("navLinks").classList.remove("show");
}

/* CLICK OUTSIDE CLOSE */
document.addEventListener("click", function(e){
let menu = document.getElementById("navLinks");
let btn = document.querySelector(".menu");

if(!menu.contains(e.target) && !btn.contains(e.target)){
menu.classList.remove("show");
}
});

</script>

<script>
  let products = [];
let cart = [];

/* ================= LOAD ================= */
function load() {
    fetch("/api/products", { credentials: "include" })
        .then(r => {
            if (!r.ok) throw "Session expired / login missing";
            return r.json();
        })
        .then(data => {
            console.log("DATA:", data);

            products = Array.isArray(data) ? data : [];
            render(products);
            loadKPI();
        })
        .catch(err => {
            console.log("LOAD ERROR:", err);
        });
}

    fetch("/api/save_order", {
        method: "POST",

            "Content-Type": "application/json"

/* ================= RENDER ================= */
function render(data) {

    let html = "";

    data.forEach(p => {

        let img = p.image ? p.image : "https://via.placeholder.com/200";

        html += `
        <div class="card">
            <img src="${img}">
            <h3>${p.name}</h3>
            <p>💰 PKR ${p.price.toLocaleString()}</p>
            <p>📦 Qty: ${p.quantity}</p>

            <div class="btns">
                <button onclick="buy(${p.id})">🛒 Buy</button>
                <button onclick="del(${p.id})">🗑 Delete</button>
            </div>
        </div>`;
    });

    document.getElementById("grid").innerHTML = html;
}

/* ================= KPI (SAFE) ================= */
function loadKPI() {
    fetch("/api/reports/kpi", { credentials: "include" })
        .then(async r => {
            let data = await r.json();
            console.log("KPI:", data);
            return data;
        })
        .then(kpi => {
            document.getElementById("total").innerText = kpi.orders || 0; 
            // document.getElementById("total").innerText = kpi.products || 0;
            document.getElementById("low").innerText = kpi.low_stock || 0;
            document.getElementById("rev").innerText = "PKR " + (kpi.revenue || 0).toLocaleString();
        })
        .catch(err => console.log("KPI ERROR:", err));
}

function updateBill() {
    let html = "";
    let total = 0;
    cart.forEach(p => {
        html += `<p>${p.name} <span>PKR ${p.price.toLocaleString()}</span></p>`;
        total += p.price;
    });

    // Apply discount
    let sel = document.getElementById("discountSelect");
    let parts = sel ? sel.value.split("|") : ["0","none"];
    let dVal = parseFloat(parts[0]) || 0;
    let dType = parts[1] || "none";
    let discountAmt = 0;
    if(dType === "Percentage") discountAmt = total * (dVal/100);
    else if(dType === "Flat") discountAmt = Math.min(dVal, total);

    let afterDiscount = total - discountAmt;
    let tax = afterDiscount * 0.05;
    let grand = afterDiscount + tax;

    document.getElementById("billItems").innerHTML = html;
    document.getElementById("totalBill").innerText = "PKR " + total.toFixed(2);
    document.getElementById("tax").innerText = "PKR " + tax.toFixed(2);
    document.getElementById("grand").innerText = "PKR " + grand.toFixed(2);

    let dRow = document.getElementById("discountRow");
    let dAmt = document.getElementById("discountAmt");
    if(discountAmt > 0){
        dRow.style.display = "block";
        dAmt.innerText = "- PKR " + discountAmt.toFixed(2);
    } else {
        dRow.style.display = "none";
    }
}

async function loadDiscounts(){
    try {
        let res = await fetch("/api/discounts", {credentials:"include"});
        let discounts = await res.json();
        let sel = document.getElementById("discountSelect");
        discounts.filter(d=>d.status==="Active").forEach(d=>{
            let opt = document.createElement("option");
            opt.value = d.value + "|" + d.type;
            opt.textContent = d.name + " (" + (d.type==="Percentage" ? d.value+"%" : "PKR "+d.value) + " off)";
            sel.appendChild(opt);
        });
    } catch(e){}
}

/* ================= ADD ================= */
function add() {

    let formData = new FormData();

    formData.append("name", document.getElementById("name").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("quantity", document.getElementById("qty").value);
    formData.append("category", document.getElementById("category").value);

    let img = document.getElementById("img");
    if (img.files.length > 0) {
        formData.append("image", img.files[0]);
    }

    fetch("/api/add", {
        method: "POST",
        body: formData,
        credentials: "include"
    })
    .then(r => r.json())
    .then(() => load())
    .catch(err => console.log("ADD ERROR:", err));
}

/* ================= BUY ================= */
function buy(id) {

    let product = products.find(p => p.id === id);

    if (!product) return;

    cart.push({
        id: product.id,
        name: product.name,
        price: product.price
    });

    updateBill();

    fetch("/api/buy/" + id, {
        method: "PUT",
        credentials: "include"
    })
    .then(() => load());
}

function del(id) {

    })
    .then(() => load())
    .catch(err => {

        alert("Delete API backend me add karo!");
    });
}

/* ================= LOW STOCK ALARM ================= */
async function loadAlarm() {
  try {
    const res = await fetch("/api/products", {credentials:"include"});
    const prods = await res.json();
    const lowItems = prods.filter(p => p.quantity < 10);
    const outItems = prods.filter(p => p.quantity === 0);

    const badge = document.getElementById("bellBadge");
    if (lowItems.length > 0) {
      badge.textContent = lowItems.length;
      badge.style.background = outItems.length > 0 ? "#ef4444" : "#f59e0b";
    } else {
      badge.style.background = "#22c55e";
      badge.textContent = "✓";
      badge.style.animation = "none";
    }

    const list = document.getElementById("alarmList");
    if (lowItems.length === 0) {
      list.innerHTML = `<div style="padding:20px;text-align:center;color:#22c55e;font-size:13px">✅ All products are well stocked!</div>`;
    } else {
      list.innerHTML = lowItems.map(p => {
        const color = p.quantity === 0 ? "#ef4444" : "#f59e0b";
        const label = p.quantity === 0 ? "OUT OF STOCK" : `Only ${p.quantity} left`;
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:9px;margin-bottom:4px;background:rgba(255,255,255,0.03)">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
            <span style="color:#e6edf7;font-size:12px;font-weight:600">${p.name}</span>
          </div>
          <span style="color:${color};font-size:11px;font-weight:700">${label}</span>
        </div>`;
      }).join("");
    }
  } catch(e) { console.log("Alarm error:", e); }
}

function toggleAlarm(e) {
  e.preventDefault();
  e.stopPropagation();
  const panel = document.getElementById("alarmPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

document.addEventListener("click", function(e) {
  const panel = document.getElementById("alarmPanel");
  const bell = document.getElementById("bellBtn");
  if (panel && bell && !panel.contains(e.target) && !bell.contains(e.target)) {
    panel.style.display = "none";
  }
});
</script>
